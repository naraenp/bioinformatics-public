# Lightweight CI environment for spatial_visium_nf's pytest smoke suite.
# This is a deliberate SUBSET of envs/spatial_visium_env.yml: the unit tests in
# tests/test_pipeline.py cover the pure logic — NNLS deconvolution, Moran's I +
# the kNN graph, per-cell-type signature means, and the synthetic-demo
# generators — which only need numpy/pandas/scipy/h5py. The full
# scanpy/squidpy/anndata stack is exercised by run_local.sh --demo, not by the
# unit suite, so CI omits it to stay fast. numpy is pinned to 1.26 to match the
# pipeline env.
name: spatial_visium_ci
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=1.26.*
  - pandas=2.*
  - scipy=1.*
  - h5py=3.*
  - plotly=6.*
  - pytest=8.*
