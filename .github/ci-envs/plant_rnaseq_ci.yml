# Lightweight CI environment for plant_rnaseq_nf's pytest smoke suite.
# This is a deliberate SUBSET of envs/plant_rnaseq_env.yml: the unit tests in
# tests/test_pipeline.py exercise the pure helpers in bin/ (FDR, GMT parsing,
# featureCounts column mapping, clustering, demo-data generation) and only need
# numpy/pandas/scipy/plotly. The heavy aligner toolchain (hisat2, fastp,
# samtools, subread, sra-tools) and pydeseq2 are exercised by run_local.sh
# --demo, not by the unit suite, so CI omits them to stay fast.
name: plant_rnaseq_ci
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=2.*
  - pandas=2.*
  - scipy=1.*
  - plotly=6.*
  - pytest=8.*
